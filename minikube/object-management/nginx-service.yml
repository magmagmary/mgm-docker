# kubectl expose pod nginx-pod --type=NodePort --port=80 --target-port=80

apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  labels:
    app: nginx
  annotations:
    description: "Nginx Service for Minikube"
spec:
  type: NodePort
  ports:
    - port: 80
      protocol: TCP
      targetPort: 80
  selector:
    app: nginx # this is the label of the pod

