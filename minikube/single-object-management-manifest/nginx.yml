 apiVersion: v1
 kind: Pod
 metadata:
  name: nginx-pod
  labels:
    app: nginx
  annotations:
    description: "Nginx Pod for Minikube"
 spec:
  containers:
    - image: nginx:1.29.7
      name: nginx-container
      ports:
        - containerPort: 80


--- # This is a separator for the next manifest

apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  labels:
    app: nginx
  annotations:
    description: "Nginx Service for Minikube"
spec:
  type: NodePort
  ports:
    - port: 80
      protocol: TCP